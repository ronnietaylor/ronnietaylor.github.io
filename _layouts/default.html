<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% if site.twitter_username %}
    <meta name="twitter:site" content="@{{ site.twitter_username }}">
    {% endif %}
    {% if site.github_username %}
    <meta name="github:site" content="@{{ site.github_username }}">
    {% endif %}
    {% seo %}
    {% include head-custom.html %}
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>{{ site.title }}</h1>
        <p class="tagline">{{ site.description }}</p>
        
        <div class="cta-buttons">
          <a href="mailto:{{ site.email }}" class="btn btn-primary">Get in Touch</a>
          <a href="/ronnie-taylor-resume.pdf" class="btn btn-outline" download>Download Resume</a>
        </div>
      </header>

      <main>
        {{ content }}
      </main>

      <footer>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Built with Jekyll.</p>
      </footer>
    </div>
  </body>
</html>
